# SeaTunnel 高级数据转换示例
# 支持复杂的业务逻辑处理

env {
  job.name = "advanced-mysql-sync"
  job.mode = "STREAMING"
  checkpoint.interval = 10000
  parallelism = 2
}

source {
  MySQL-CDC {
    hostname = "localhost"
    port = 3306
    username = "root"
    password = "JZ8Qrd,ZlkPHs"
    database-name = "focus_admin"
    table-name = "t_flink_basics_test"
    startup.mode = "initial"
    result_table_name = "raw_data"
    
    # CDC 元数据配置
    include-schema-changes = false
    debezium = {
      # Debezium 特定配置
      "database.server.name" = "mysql_cdc_source"
      "database.history.skip.unparseable.ddl" = "true"
      "include.schema.changes" = "false"
    }
  }
}

transform {
  # 1. 数据清洗
  Sql {
    source_table_name = "raw_data"
    result_table_name = "cleaned_data"
    sql = """
      SELECT 
        id,
        TRIM(UPPER(name)) as name,
        create_by,
        create_time,
        update_by,
        update_time,
        COALESCE(version, 0) as version,
        -- CDC 元数据
        __op as cdc_operation,
        __ts_ms as cdc_timestamp
      FROM raw_data
      WHERE name IS NOT NULL 
        AND LENGTH(TRIM(name)) > 0
    """
  }
  
  # 2. 业务规则处理
  Sql {
    source_table_name = "cleaned_data"
    result_table_name = "business_processed"
    sql = """
      SELECT 
        id,
        name,
        create_by,
        create_time,
        update_by,
        update_time,
        version,
        cdc_operation,
        cdc_timestamp,
        -- 业务字段计算
        CASE 
          WHEN cdc_operation = 'c' THEN 'INSERT'
          WHEN cdc_operation = 'u' THEN 'UPDATE' 
          WHEN cdc_operation = 'd' THEN 'DELETE'
          WHEN cdc_operation = 'r' THEN 'SNAPSHOT'
          ELSE 'UNKNOWN'
        END as operation_type,
        -- 数据同步时间
        CURRENT_TIMESTAMP as sync_timestamp,
        -- 数据质量检查
        CASE 
          WHEN name REGEXP '^[a-zA-Z0-9_\\s\\u4e00-\\u9fa5]+$' THEN 'VALID'
          ELSE 'INVALID'
        END as data_quality
      FROM cleaned_data
    """
  }
  
  # 3. 数据分流（根据操作类型）
  Filter {
    source_table_name = "business_processed"
    result_table_name = "valid_operations"
    fields = [
      "data_quality = 'VALID'",
      "operation_type IN ('INSERT', 'UPDATE', 'DELETE', 'SNAPSHOT')"
    ]
  }
  
  # 4. 字段重命名和最终转换
  FieldMapper {
    source_table_name = "valid_operations"
    result_table_name = "final_data"
    field_mapper = {
      id = "source_id"
      name = "name"
      create_by = "create_by" 
      create_time = "create_time"
      update_by = "update_by"
      update_time = "update_time"
      version = "version"
      operation_type = "cdc_op_type"
      sync_timestamp = "process_time"
    }
  }
}

sink {
  # 主要输出：目标MySQL表
  Jdbc {
    source_table_name = "final_data"
    url = "jdbc:mysql://localhost:3306/focus_admin"
    driver = "com.mysql.cj.jdbc.Driver" 
    user = "root"
    password = "JZ8Qrd,ZlkPHs"
    table = "t_flink_basics_test_2"
    primary_keys = ["name"]
    is_upsert = true
    batch_size = 100
    batch_interval_ms = 5000
  }
  
  # 备份输出：写入Kafka（可选）
  Kafka {
    source_table_name = "final_data"
    topic = "mysql_cdc_backup"
    bootstrap.servers = "localhost:9092"
    key.serializer = "org.apache.kafka.common.serialization.StringSerializer"
    value.serializer = "org.apache.kafka.common.serialization.StringSerializer"
    format = "json"
  }
  
  # 监控输出：写入Elasticsearch（可选）  
  Elasticsearch {
    source_table_name = "final_data"
    hosts = ["http://localhost:9200"]
    index = "mysql_cdc_monitor"
    index_type = "_doc"
  }
}
