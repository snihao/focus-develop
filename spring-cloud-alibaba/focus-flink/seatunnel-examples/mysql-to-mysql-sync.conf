# Apache SeaTunnel 配置示例
# MySQL 到 MySQL 的实时数据同步

env {
  # 作业名称
  job.name = "mysql-cdc-sync"
  
  # 执行模式：streaming（流处理）或 batch（批处理）
  job.mode = "STREAMING"
  
  # 检查点配置
  checkpoint.interval = 10000
  
  # 并行度
  parallelism = 1
}

source {
  # MySQL CDC 源连接器
  MySQL-CDC {
    # 数据库连接信息
    hostname = "localhost"
    port = 3306
    username = "root"
    password = "JZ8Qrd,ZlkPHs"
    database-name = "focus_admin"
    table-name = "t_flink_basics_test"
    
    # CDC 配置
    startup.mode = "initial"  # initial, earliest, latest, timestamp
    stop.mode = "never"       # never, latest, timestamp
    
    # 输出格式
    format = "DEFAULT"
    
    # 结果表名（用于后续引用）
    result_table_name = "source_table"
  }
}

transform {
  # 数据转换（可选）
  FieldMapper {
    source_table_name = "source_table"
    result_table_name = "transformed_table"
    
    # 字段映射配置
    field_mapper = {
      # 源字段 -> 目标字段
      id = "source_id"
      name = "name"  
      create_by = "create_by"
      create_time = "create_time"
      update_by = "update_by" 
      update_time = "update_time"
      version = "version"
    }
  }
  
  # 数据过滤（可选）
  Filter {
    source_table_name = "transformed_table"
    result_table_name = "filtered_table"
    
    # 过滤条件
    fields = [
      "name IS NOT NULL",
      "name != ''"
    ]
  }
  
  # 数据富化（可选）
  Sql {
    source_table_name = "filtered_table"
    result_table_name = "enriched_table"
    
    # SQL 转换
    sql = """
      SELECT 
        source_id,
        name,
        create_by,
        create_time,
        update_by,
        update_time,
        version,
        CURRENT_TIMESTAMP as sync_time
      FROM filtered_table
    """
  }
}

sink {
  # MySQL 目标连接器
  Jdbc {
    source_table_name = "enriched_table"
    
    # 目标数据库连接
    url = "jdbc:mysql://localhost:3306/focus_admin?serverTimezone=GMT%2B8&rewriteBatchedStatements=true"
    driver = "com.mysql.cj.jdbc.Driver"
    user = "root"
    password = "JZ8Qrd,ZlkPHs"
    
    # 目标表
    table = "t_flink_basics_test_2"
    
    # 写入模式
    primary_keys = ["name"]  # 基于name字段进行UPSERT
    is_upsert = true         # 启用UPSERT模式
    
    # 批量写入配置
    batch_size = 100
    batch_interval_ms = 5000
    
    # 重试配置
    max_retries = 3
    retry_backoff_multiplier_ms = 100
    max_retry_backoff_ms = 2000
  }
}
